---
- name: Fail if OS is not supported
  fail:
    msg: "This role only supports Debian/Ubuntu and RedHat/CentOS families. Detected OS family: {{ ansible_os_family }}"
  when: ansible_os_family not in ['Debian', 'RedHat']

- name: Set facts for Debian/Ubuntu
  set_fact:
    vector_package_path: "/tmp/vector_{{ vector_version }}-1_amd64.deb"
    vector_package_manager: apt
    vector_package_type: deb
  when: ansible_os_family == "Debian"

- name: Set facts for RedHat/CentOS
  set_fact:
    vector_package_path: "/tmp/vector-{{ vector_version }}-1.x86_64.rpm"
    vector_package_manager: yum
    vector_package_type: rpm
  when: ansible_os_family == "RedHat"

- name: Debian/Ubuntu - Copy .deb package
  become: true
  ansible.builtin.copy:
    src: "files/vector_{{ vector_version }}-1_amd64.deb"
    dest: "{{ vector_package_path }}"
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: RedHat/CentOS - Download .rpm package
  become: true
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-1.x86_64.rpm"
    dest: "{{ vector_package_path }}"
    mode: '0644'
  when: ansible_os_family == "RedHat"

- name: Debian/Ubuntu - Install vector package with apt
  become: true
  ansible.builtin.apt:
    deb: "{{ vector_package_path }}"
    state: present
  when: ansible_os_family == "Debian"

- name: RedHat/CentOS - Install vector package with yum
  become: true
  ansible.builtin.yum:
    name: "{{ vector_package_path }}"
    state: present
    disable_gpg_check: yes
  when: ansible_os_family == "RedHat"

- name: Vector | Template config
  ansible.builtin.template:
    src: vector.yml.j2
    dest: /etc/vector/vector.yml
    mode: "0644"
    owner: root
    group: root
    validate: vector validate --no-environment --config-yaml %s

- name: Vector | Create systemd unit
  become: true
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    mode: "0644"
    owner: root
    group: root

- name: Vector | Start service
  become: true
  ansible.builtin.systemd:
    name: vector
    state: started
    enabled: yes
    daemon_reload: yes
