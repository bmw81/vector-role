---
dependency:
  name: galaxy
  enabled: true

driver:
  name: docker
  options:
    D: true
    vv: true

platforms:
  - name: centos-8
    image: geerlingguy/docker-centos8-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /usr/sbin/init
    groups:
      - rhel_family

  - name: ubuntu-22-04
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    groups:
      - debian_family

  - name: ubuntu-20-04
    image: geerlingguy/docker-ubuntu2004-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    groups:
      - debian_family

provisioner:
  name: ansible
  config_options:
    defaults:
      host_key_checking: false
      interpreter_python: auto_silent
      timeout: 30
  env:
    ANSIBLE_FORCE_COLOR: "true"
    ANSIBLE_PIPELINING: "true"
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy

lint: |
  set -e
  yamllint .
  ansible-lint
